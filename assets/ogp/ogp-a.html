<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{
  font-family:'Inter','Noto Sans JP',sans-serif;
  background:#fafafa;color:#000;
  position:relative;display:flex;align-items:center;
  padding:0 80px;
}
.wm{
  position:absolute;top:-15%;right:-3%;
  font-family:'Inter';font-weight:900;
  font-size:760px;letter-spacing:-0.06em;line-height:1;
  color:rgba(0,0,0,0.045);user-select:none;
}
.slash{
  position:absolute;top:65%;left:-10%;width:130%;height:3px;
  background:#D7481F;opacity:0.22;transform:rotate(-12deg);
}
.content{position:relative;z-index:2;max-width:780px;}
.meta{
  font-family:'Inter';font-size:13px;font-weight:700;
  letter-spacing:.45em;text-transform:uppercase;color:#000;
  margin-bottom:30px;display:flex;align-items:center;gap:14px;
}
.meta::before{content:"";width:36px;height:1px;background:#000;}
.logo{
  font-family:'Inter';font-weight:900;
  font-size:108px;letter-spacing:-0.045em;line-height:0.95;
  margin-bottom:24px;
}
.tagline{
  font-family:'Noto Sans JP';font-weight:900;
  font-size:34px;letter-spacing:-0.02em;line-height:1.4;
  border-top:1px solid #000;padding-top:20px;
}
.hl{
  background:#D7481F;color:#fff;padding:2px 12px;display:inline-block;
}
.hl-q{color:#D7481F;}
.url{
  position:absolute;bottom:36px;right:80px;
  font-family:'Inter';font-size:14px;font-weight:700;
  letter-spacing:.3em;color:#444;
}
</style></head><body>
<div class="wm">V/</div>
<div class="slash"></div>
<div class="content">
  <div class="meta">V/AIBOU PLATFORM</div>
  <div class="logo">V/AIBOU</div>
  <div class="tagline">病まない、休まない、辞めない。<br>経営者の<span class="hl-q">"相棒"</span>を、<span class="hl">月3万円</span>から。</div>
</div>
<div class="url">v-aibou.com</div>
</body></html>
