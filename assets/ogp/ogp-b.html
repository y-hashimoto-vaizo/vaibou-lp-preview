<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{
  font-family:'Inter','Noto Sans JP',sans-serif;
  background:#000;color:#fff;
  position:relative;
  padding:60px 80px;
}
.bar{position:absolute;top:0;left:0;width:100%;height:6px;background:#D7481F;}
.top-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:50px;
}
.meta{
  font-family:'Inter';font-size:12px;font-weight:700;
  letter-spacing:.45em;text-transform:uppercase;color:#888;
}
.url{
  font-family:'Inter';font-size:12px;font-weight:700;
  letter-spacing:.3em;color:#888;
}
.tagline{
  font-family:'Noto Sans JP';font-weight:900;
  font-size:50px;letter-spacing:-0.03em;line-height:1.3;
  margin-bottom:42px;
}
.hl-orange{color:#D7481F;}
.divider{height:1px;background:#444;margin-bottom:24px;}
.foot{
  display:flex;justify-content:space-between;align-items:center;
}
.logo{
  font-family:'Inter';font-weight:900;
  font-size:48px;letter-spacing:-0.045em;line-height:1;color:#fff;
}
.sub{
  font-family:'Noto Sans JP';font-weight:500;
  font-size:15px;color:#aaa;letter-spacing:.05em;
  text-align:right;line-height:1.5;
}
</style></head><body>
<div class="bar"></div>
<div class="top-row">
  <div class="meta">V/AIBOU PLATFORM</div>
  <div class="url">v-aibou.com</div>
</div>
<div class="tagline">
  病まない、休まない、辞めない。<br>
  経営者の<span class="hl-orange">"相棒"</span>を、<br>
  <span class="hl-orange">月3万円</span>から。
</div>
<div class="divider"></div>
<div class="foot">
  <div class="logo">V/AIBOU</div>
  <div class="sub">経営者の相棒であり、<br>経営のバイブル。</div>
</div>
</body></html>
