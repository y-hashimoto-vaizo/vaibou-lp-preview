<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;overflow:hidden;}
body{
  font-family:'Inter','Noto Sans JP',sans-serif;
  background:#fff;color:#000;
  position:relative;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:60px;
  text-align:center;
}
.meta{
  font-family:'Inter';font-size:13px;font-weight:700;
  letter-spacing:.5em;text-transform:uppercase;color:#000;
  margin-bottom:36px;display:flex;align-items:center;gap:14px;
}
.meta::before,.meta::after{content:"";width:48px;height:1px;background:#000;}
.logo{
  font-family:'Inter';font-weight:900;
  font-size:220px;letter-spacing:-0.05em;line-height:0.9;
  margin-bottom:36px;
  position:relative;
}
.logo .slash{color:#D7481F;}
.tagline{
  font-family:'Noto Sans JP';font-weight:900;
  font-size:38px;letter-spacing:-0.02em;line-height:1.3;
  border-top:2px solid #000;border-bottom:2px solid #000;
  padding:18px 32px;
}
.tagline .hl{
  background:#D7481F;color:#fff;padding:2px 14px;
}
.url{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  font-family:'Inter';font-size:13px;font-weight:700;
  letter-spacing:.4em;color:#444;
}
</style></head><body>
<div class="meta">V/AIBOU PLATFORM</div>
<div class="logo">V<span class="slash">/</span>AIBOU</div>
<div class="tagline">経営者の相棒、<span class="hl">月3万円</span>から。</div>
<div class="url">v-aibou.com</div>
</body></html>
